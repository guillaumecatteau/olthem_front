<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Olthem</title>
    <meta name="description" content="Frontend headless Olthem." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geologica:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="./assets/images/icons/icon_InfoHead_white.svg"
    />
    <link rel="stylesheet" href="./assets/css/style.css?v=20260422-14" />
  </head>
  <body>
    <!-- ── Top navigation bar ──────────────────────────────────────────────── -->
    <header class="site-header" id="site-header">
      <div class="site-header__inner">
        <!-- Left: Logo + Tagline -->
        <div class="site-header__left">
          <div class="site-logo">
            <img
              class="site-logo__img"
              src="./assets/images/logos/logo_Olthem.svg"
              alt="Olthem"
            />
            <p class="site-logo__tagline">
              Plongez dans l'éducation aux médias !
            </p>
          </div>
        </div>

        <!-- Center: Navigation -->
        <nav
          class="site-header__center site-nav"
          aria-label="Navigation principale"
        >
          <a
            class="site-nav__link is-active"
            href="#accueil"
            data-section="accueil"
            >Accueil</a
          >
          <a class="site-nav__link" href="#initiative" data-section="initiative"
            >Initiative</a
          >
          <a
            class="site-nav__link"
            href="#thematiques"
            data-section="thematiques"
            >Thématiques</a
          >
          <a class="site-nav__link" href="#ressources" data-section="ressources"
            >Ressources</a
          >
          <a class="site-nav__link" href="#ateliers" data-section="ateliers"
            >Ateliers</a
          >
          <a
            class="site-nav__link"
            href="#partenaires"
            data-section="partenaires"
            >Partenaires</a
          >
        </nav>

        <!-- Right: Connexion + Search -->
        <div class="site-header__right">
          <div class="header-actions">
            <div class="header-actions__top-row">
              <div class="header-actions__auth-group">
                <button
                  class="icon-link header-actions__connexion-trigger"
                  type="button"
                  data-page-overlay="slug:connexion|back:Retour au site|overlay:overlayTotal"
                  aria-label="Se connecter"
                >
                  <img
                    class="icon-link__icon"
                    src="./assets/images/icons/icon_Connexion.svg"
                    alt=""
                    aria-hidden="true"
                  />
                  <span class="icon-link__label">Connexion</span>
                </button>

                <div
                  class="header-user-actions"
                  id="header-user-actions"
                  hidden
                >
                  <button
                    class="icon-link icon-link--plain-case"
                    id="header-account-link"
                    type="button"
                    data-page-overlay="title:Compte utilisateur|search:compte utilisateur|back:Retour au site|overlay:overlayTotal"
                    aria-label="Ouvrir le compte utilisateur"
                  >
                    <img
                      class="icon-link__icon"
                      id="header-user-icon"
                      src="./assets/images/icons/icon_User.svg"
                      alt=""
                      aria-hidden="true"
                    />
                    <span class="icon-link__label" id="header-user-label"
                      >Compte utilisateur</span
                    >
                  </button>

                  <button
                    class="icon-link"
                    id="header-logout-link"
                    type="button"
                    aria-label="Se déconnecter"
                  >
                    <img
                      class="icon-link__icon"
                      src="./assets/images/icons/icon_Deconnexion.svg"
                      alt=""
                      aria-hidden="true"
                    />
                    <span class="icon-link__label">Déconnexion</span>
                  </button>
                </div>
              </div>

              <div class="header-search" id="header-search">
                <button
                  class="header-search__toggle"
                  id="header-search-toggle"
                  type="button"
                  aria-label="Ouvrir la recherche"
                  aria-expanded="false"
                  aria-controls="header-search-panel"
                >
                  <img
                    class="header-search__icon"
                    src="./assets/images/icons/icon_Recherche.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </button>
              </div>
            </div>

            <div class="site-search" id="header-search-panel" aria-hidden="true">
              <input
                class="site-search__input"
                id="header-search-input"
                type="search"
                placeholder="Rechercher…"
                aria-label="Rechercher dans le site"
              />
            </div>

          </div>
        </div>
      </div>
    </header>

    <!-- ── Full-page magnetic scroll container ─────────────────────────────── -->
    <div id="scroll-viewport">
      <div id="scroll-track">
        <section
          class="full-section"
          id="accueil"
          data-slug="accueil"
          aria-label="Accueil"
        >
          <div class="accueil-header-cards" id="accueil-header-cards"></div>
        </section>

        <section
          class="full-section"
          id="initiative"
          data-slug="initiative"
          aria-label="Initiative"
        >
          <div class="section-inner"></div>
        </section>

        <section
          class="full-section"
          id="thematiques"
          data-slug="thematiques"
          aria-label="Thématiques"
        >
          <div class="thm-carousel-wrapper">
            <div class="thm-carousel" id="thm-carousel">
              <div class="thm-carousel__track" id="thm-carousel-track"></div>
              <button
                class="thm-carousel__btn thm-carousel__btn--prev"
                aria-label="Thématique précédente"
              >
                <span
                  class="thm-arrow thm-arrow--left"
                  style="--arrow-color: #3f3f48"
                  aria-hidden="true"
                ></span>
              </button>
              <button
                class="thm-carousel__btn thm-carousel__btn--next"
                aria-label="Thématique suivante"
              >
                <span
                  class="thm-arrow thm-arrow--right"
                  style="--arrow-color: #3f3f48"
                  aria-hidden="true"
                ></span>
              </button>
            </div>
            <div class="thm-carousel-dots" id="thm-carousel-dots"></div>
          </div>
        </section>

        <section
          class="full-section"
          id="ressources"
          data-slug="ressources"
          aria-label="Ressources"
        >
          <div class="section-inner"></div>
        </section>

        <section
          class="full-section"
          id="ateliers"
          data-slug="ateliers"
          aria-label="Ateliers"
        >
          <div class="section-inner"></div>
        </section>

        <section
          class="full-section"
          id="partenaires"
          data-slug="partenaires"
          aria-label="Partenaires"
        >
          <div class="section-inner"></div>
          <footer class="site-footer" role="contentinfo">
            <div class="site-footer__inner">
              <div class="footer-SideLinks">
                <p>
                  <span id="current-year"></span> &copy;
                  <a
                    href="https://mundaneum.org/"
                    target="_blank"
                    rel="noopener noreferrer"
                    >MUNDANEUM</a
                  >
                </p>
                <a
                  href="#mentions-legales"
                  class="site-footer__link"
                  data-page-overlay="title:Mentions légales|search:mentions|back:Retour au site"
                  >Mentions légales</a
                >
              </div>
              <div class="footer-AddOnLinks">
                <p>Contact :</p>
                <p><a href="mailto:info@mundaneum.be">info@mundaneum.be</a></p>
              </div>
              <div class="footer-AddOnLinks">
                <p>Suivez-nous :</p>
                <div id="social-links"></div>
              </div>
              <div class="footer-SideLinks">
                <p>
                  site by
                  <a
                    href="https://gcdigitalarts.com"
                    target="_blank"
                    rel="noopener noreferrer"
                    >GC DIGITAL ARTS</a
                  >
                </p>
                  <p>Powered by Wordpress</p>
                </div>
            </div>
          </footer>
        </section>
      </div>
    </div>

    <script type="module" src="./src/js/main.js?v=20260422-02"></script>
    <script type="module" src="./src/js/scroll.js?v=20260421-02"></script>
    <script type="module" src="./src/js/thematiques.js?v=20260421-02"></script>
    <script type="module" src="./src/js/secondary-scroll.js?v=20260421-02"></script>

    <!-- ── Sous-menu (glisse depuis sous le menu principal) ──────────────── -->
    <div class="site-submenu" id="site-submenu" aria-hidden="true">
      <nav class="site-submenu__nav" id="site-submenu-nav"></nav>
      <button
        class="site-submenu__retour icon-link"
        id="site-submenu-retour"
        type="button"
        aria-label="Retour"
      >
        <img
          class="icon-link__icon"
          src="./assets/images/icons/icon_Retour.svg"
          alt=""
          aria-hidden="true"
        />
        <span class="icon-link__label">Retour</span>
      </button>
    </div>

    <!-- ── Overlay thématique ────────────────────────────────────────────── -->
    <div class="thm-overlay" id="thm-overlay" aria-hidden="true">
      <div class="thm-overlay__bg-image" id="thm-overlay-bg-image"></div>
      <div class="thm-overlay__bg-pattern"></div>
      <button
        class="thm-overlay__retour"
        id="thm-overlay-retour"
        type="button"
        aria-label="Retour aux thématiques"
      >
        <span class="thm-overlay__retour-icon" aria-hidden="true"></span>
        <span class="thm-overlay__retour-label">Retour aux thématiques</span>
      </button>
      <div class="thm-overlay__inner" id="thm-overlay-inner"></div>
    </div>

    <div class="page-overlay" id="page-overlay" aria-hidden="true">
      <button
        class="icon-link page-overlay__retour"
        id="page-overlay-close"
        type="button"
        aria-label="Retour au site"
      >
        <img
          class="icon-link__icon"
          src="./assets/images/icons/icon_Retour.svg"
          alt=""
          aria-hidden="true"
        />
        <span class="icon-link__label" id="page-overlay-close-label"
          >Retour au site</span
        >
      </button>
      <div class="page-overlay__inner">
        <div class="page-overlay__content" id="page-overlay-content"></div>
      </div>
    </div>
  </body>
</html>
